version: '3.8'

services:
  backend:
    build: ./backend
    container_name: expense-backend
    ports:
      - "4000:4000"
    volumes:
      - db_data:/app/prisma/data
      - ./backend/backups:/app/backups
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=file:/app/prisma/data/dev.db
      - JWT_SECRET=${JWT_SECRET:-}
      - APP_API_KEY=${APP_API_KEY:-}
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: expense-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
    driver: local
