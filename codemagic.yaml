workflows:
  ios-build:
    name: iOS Build (ExpenseTracker)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: "16.2"
      vars:
        BUNDLE_ID: com.expensetracker.app
        SCHEME: ExpenseTracker
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode Project
        script: |
          cd $CM_BUILD_DIR
          xcodegen generate
          echo "✅ Xcode project generated"
          ls -la ExpenseTracker.xcodeproj/
      - name: Build for iOS Simulator
        script: |
          cd $CM_BUILD_DIR
          xcodebuild \
            -project ExpenseTracker.xcodeproj \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath build/ \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - build/Build/Products/Debug-iphonesimulator/*.app
      - /tmp/xcodebuild.log
    publishing:
      email:
        recipients:
          - change-me@example.com
