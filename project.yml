name: ExpenseTracker
options:
  bundleIdPrefix: com.expensetracker
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"

targets:
  ExpenseTracker:
    type: application
    platform: iOS
    sources:
      # App
      - path: ExpenseTracker/App
      # Models
      - path: ExpenseTracker/Models
      # Services
      - path: ExpenseTracker/Services
      # Views
      - path: ExpenseTracker/Views
      # Utils
      - path: ExpenseTracker/Utils
      # Resources
      - path: ExpenseTracker/Resources
        buildPhase: resources
        excludes:
          - "Info.plist"
    settings:
      base:
        INFOPLIST_FILE: ExpenseTracker/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.expensetracker.app
        PRODUCT_NAME: ExpenseTracker
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
        CODE_SIGN_ENTITLEMENTS: ExpenseTracker/ExpenseTracker.entitlements
    dependencies:
      - framework: SwiftUI.framework
        embed: false
      - framework: SwiftData.framework
        embed: false
      - framework: CloudKit.framework
        embed: false
      - framework: Combine.framework
        embed: false
      - framework: BackgroundTasks.framework
        embed: false
      - framework: UserNotifications.framework
        embed: false
      - framework: LocalAuthentication.framework
        embed: false
    preBuildScripts:
      - name: "SwiftLint (skip if missing)"
        script: |
          if which swiftlint >/dev/null; then
            swiftlint --config .swiftlint.yml || true
          fi
        basedOnDependencyAnalysis: false
    postBuildScripts:
      - name: "Build Complete"
        script: echo "ExpenseTracker build finished."
        basedOnDependencyAnalysis: false
